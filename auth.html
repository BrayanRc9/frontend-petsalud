
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Registro e inicio de sesión de usuarios - Plataforma veterinaria">
  <title>Autenticación - Veterinaria</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<header>
    <nav class="navbar">
      <img src="img/1PETSALUD-LOGO.png" alt="Logo Veterinaria" class="logo"/>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
<body>
  <section class="auth-container">
    <div class="form-box">
      <h2>Iniciar Sesión</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Contraseña">
        <button id="btn-login">Ingresar</button>
      </form>
    </div>

    <div class="form-box">
      <h2>Registrarse</h2>
      <form id="register-form">
        <input type="text" id="registro-nombre" placeholder="Nombre">
    <input type="email" id="registro-email" placeholder="Email">
    <input type="password" id="registro-password" placeholder="Contraseña">
    <!-- <select id="registro-rol">
      <option value="cliente">Cliente</option>
      <option value="medico">Médico</option>
      <option value="admin">Administrador</option>
    </select> -->
    <button id="btn-registrar">Registrarse</button>
      </form>
    </div>
  </section>
  
  <script src="config.js"></script>
  <script src="auth.js"></script>

</html>
